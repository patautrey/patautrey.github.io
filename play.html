<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chord Player</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1f26;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #122b35;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      text-align: center;
      min-width: 260px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 4px 0 16px;
      opacity: 0.8;
    }
    button {
      background: #1dd1a1;
      border: none;
      color: #041015;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    button:hover:enabled {
      background: #10ac84;
    }
    .error {
      color: #ff6b6b;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="chord-label">Chord Player</h1>
    <p id="status">Loading chord…</p>
    <button id="play-btn" disabled>Play again</button>
    <div id="error" class="error"></div>
  </div>

  <script>
    // --- URL params ---
    const params = new URLSearchParams(window.location.search);
    const chordParam = params.get("chord");
    const instrumentParam = (params.get("instrument") || "piano").toLowerCase();
    const gtrStyleParam = (params.get("gtr_style") || "steel").toLowerCase(); // steel, nylon, jazz, ambient
    const strumParam = (params.get("strum") || "down").toLowerCase(); // down, up, block

    const chordLabel = document.getElementById("chord-label");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const playBtn = document.getElementById("play-btn");

    if (!chordParam) {
      chordLabel.textContent = "No chord provided";
      statusEl.textContent = "Add ?chord=C, ?chord=Am, ?chord=G7, etc.";
      playBtn.disabled = true;
    } else {
      chordLabel.textContent = chordParam;
      statusEl.textContent = "Tap to audition this chord.";
      playBtn.disabled = false;
    }

    // --- Chord parsing ---
    const ROOT_TO_SEMITONE = {
      "C": 0, "B#": 0,
      "C#": 1, "Db": 1,
      "D": 2,
      "D#": 3, "Eb": 3,
      "E": 4, "Fb": 4,
      "F": 5, "E#": 5,
      "F#": 6, "Gb": 6,
      "G": 7,
      "G#": 8, "Ab": 8,
      "A": 9,
      "A#": 10, "Bb": 10,
      "B": 11, "Cb": 11
    };

    function rootToMidi(root, octave = 4) {
      const semitone = ROOT_TO_SEMITONE[root.toUpperCase()];
      if (semitone === undefined) return null;
      return 12 * (octave + 1) + semitone;
    }

    // Normalize quality: Unicode flats/sharps → ASCII
    function normalizeQuality(q) {
      if (!q) return "";
      return q
        .replace(/♭/g, "b")
        .replace(/♯/g, "#")
        .replace(/–/g, "-")
        .trim()
        .toLowerCase();
    }

    function parseSimpleChord(chord) {
      const match = chord.match(/^([A-G](?:#|b)?)(.*)$/i);
      if (!match) return null;
      const root = match[1];
      const rawQuality = match[2] || "";
      const quality = normalizeQuality(rawQuality);
      return { root, quality };
    }

    // Literal slash-chord parsing: RootQuality/BassRoot
    function parseChord(chord) {
      let main = chord;
      let bassRoot = null;

      const slashIndex = chord.indexOf("/");
      if (slashIndex !== -1) {
        main = chord.slice(0, slashIndex).trim();
        const bassPart = chord.slice(slashIndex + 1).trim();
        const m = bassPart.match(/^([A-G](?:#|b)?)/i);
        if (m) bassRoot = m[1];
      }

      const parsedMain = parseSimpleChord(main);
      if (!parsedMain) return null;
      return { root: parsedMain.root, quality: parsedMain.quality, bassRoot };
    }

    // Expanded chord interval builder
    function buildChordIntervals(quality) {
      // Base triads
      if (quality === "" || quality === "maj" || quality === "major") {
        return [0, 4, 7];
      }
      if (quality === "m" || quality === "min" || quality === "minor") {
        return [0, 3, 7];
      }
      if (quality === "dim" || quality === "°") {
        return [0, 3, 6];
      }
      if (quality === "aug" || quality === "+") {
        return [0, 4, 8];
      }

      // Sevenths
      if (quality === "7") return [0, 4, 7, 10];
      if (quality === "maj7" || quality === "Δ" || quality === "ma7") return [0, 4, 7, 11];
      if (quality === "m7" || quality === "min7") return [0, 3, 7, 10];
      if (quality === "dim7" || quality === "°7") return [0, 3, 6, 9];
      if (quality === "m7b5" || quality === "ø7") return [0, 3, 6, 10];

      // Sixths
      if (quality === "6") return [0, 4, 7, 9];
      if (quality === "m6") return [0, 3, 7, 9];
      if (quality === "maj6") return [0, 4, 7, 9];

      // Add chords
      if (quality === "add9") return [0, 4, 7, 14];
      if (quality === "add2") return [0, 2, 4, 7];
      if (quality === "add4" || quality === "add11") return [0, 4, 5, 7];
      if (quality === "add6") return [0, 4, 7, 9];

      // 6/9
      if (quality === "6/9" || quality === "69") return [0, 4, 7, 9, 14];

      // Suspended
      if (quality === "sus" || quality === "sus4") return [0, 5, 7];
      if (quality.startsWith("sus2")) return [0, 2, 7];
      if (quality === "7sus4") return [0, 5, 7, 10];
      if (quality === "9sus4" || quality === "sus9") return [0, 5, 7, 10, 14];

      // Extensions (un‑altered)
      if (quality === "9") return [0, 4, 7, 10, 14];
      if (quality === "11") return [0, 4, 7, 10, 14, 17];
      if (quality === "13") return [0, 4, 7, 10, 14, 17, 21];

      if (quality === "maj9") return [0, 4, 7, 11, 14];
      if (quality === "maj11") return [0, 4, 7, 11, 14, 17];
      if (quality === "maj13") return [0, 4, 7, 11, 14, 17, 21];

      if (quality === "m9") return [0, 3, 7, 10, 14];
      if (quality === "m11") return [0, 3, 7, 10, 14, 17];
      if (quality === "m13") return [0, 3, 7, 10, 14, 17, 21];

      // Core altered dominants
      if (quality === "7b9") return [0, 4, 7, 10, 13];
      if (quality === "7#9") return [0, 4, 7, 10, 15];
      if (quality === "7b5") return [0, 4, 6, 10];
      if (quality === "7#5") return [0, 4, 8, 10];
      if (quality === "7b9b13") return [0, 4, 7, 10, 13, 20];
      if (quality === "7#9b13") return [0, 4, 7, 10, 15, 20];
      if (quality === "7#11") return [0, 4, 7, 10, 18];
      if (quality === "7b13") return [0, 4, 7, 10, 20];

      // Additional b5/#5 + 9/11/13 combos
      if (quality === "7b5b9") return [0, 4, 6, 10, 13];
      if (quality === "7b5#9") return [0, 4, 6, 10, 15];
      if (quality === "7#5b9") return [0, 4, 8, 10, 13];
      if (quality === "7#5#9") return [0, 4, 8, 10, 15];

      if (quality === "7b5b13") return [0, 4, 6, 10, 20];
      if (quality === "7b5#11") return [0, 4, 6, 10, 18];
      if (quality === "7#5b13") return [0, 4, 8, 10, 20];
      if (quality === "7#5#11") return [0, 4, 8, 10, 18];

      if (quality === "7b9#11") return [0, 4, 7, 10, 13, 18];
      if (quality === "7#9#11") return [0, 4, 7, 10, 15, 18];
      if (quality === "7b9b5") return [0, 4, 6, 10, 13];
      if (quality === "7b9#5") return [0, 4, 8, 10, 13];
      if (quality === "7#9b5") return [0, 4, 6, 10, 15];
      if (quality === "7#9#5") return [0, 4, 8, 10, 15];

      if (quality === "7alt") {
        // Generic altered dominant: 1,3,b5,#5,b7,b9,#9
        return [0, 4, 6, 8, 10, 13, 15];
      }

      // Fallback: treat as major triad
      return [0, 4, 7];
    }

    function buildChordNotes(parsed) {
      if (!parsed) return null;
      const { root, quality, bassRoot } = parsed;

      const rootMidi = rootToMidi(root, 4);
      if (rootMidi == null) return null;

      const intervals = buildChordIntervals(quality);
      const chordNotes = intervals.map(i => rootMidi + i);

      // Literal slash-chord bass handling
      if (bassRoot) {
        const bassMidiBase = rootToMidi(bassRoot, 2); // octave 2
        if (bassMidiBase == null) return chordNotes;

        let bassMidi = bassMidiBase;
        const minChord = Math.min(...chordNotes);
        while (bassMidi > minChord - 10) bassMidi -= 12;

        return [bassMidi, ...chordNotes];
      }

      return chordNotes;
    }

    // --- Guitar voicing engine (drop-style, bass-aware) ---
    function mapToGuitarVoicing(midiNotes) {
      if (!midiNotes || !midiNotes.length) return midiNotes;

      let tones = midiNotes.slice().sort((a, b) => a - b);

      // Detect dedicated bass by large gap
      let hasBass = false;
      if (tones.length >= 4 && (tones[1] - tones[0]) > 10) {
        hasBass = true;
      }

      const bassStringRoot = 40; // E2
      const upperStringRoots = [52, 57, 62, 67]; // A2, D3, G3, B3
      const minFret = 3;
      const maxFret = 9;

      if (hasBass) {
        const bassNote = tones[0];
        const upperTones = tones.slice(1);

        let bassTarget = bassNote;
        while (bassTarget < bassStringRoot + minFret) bassTarget += 12;
        while (bassTarget > bassStringRoot + maxFret) bassTarget -= 12;

        let voicing;
        if (upperTones.length === 3) {
          voicing = [upperTones[0], upperTones[1] + 12, upperTones[2] + 12];
        } else if (upperTones.length >= 4) {
          voicing = [upperTones[1], upperTones[2], upperTones[3], upperTones[0] + 12];
        } else {
          voicing = upperTones.slice();
        }

        let mappedUpper = voicing.map((note, i) => {
          const stringRoot = upperStringRoots[i % upperStringRoots.length];
          let target = note;
          while
