<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chord Player</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1f26;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #122b35;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      text-align: center;
      min-width: 260px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 4px 0 16px;
      opacity: 0.8;
    }
    button {
      background: #1dd1a1;
      border: none;
      color: #041015;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    button:hover:enabled {
      background: #10ac84;
    }
    .error {
      color: #ff6b6b;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="chord-label">Chord Player</h1>
    <p id="status">Loading chord…</p>
    <button id="play-btn" disabled>Play again</button>
    <div id="error" class="error"></div>
  </div>

  <script>
    // --- URL params ---
    const params = new URLSearchParams(window.location.search);
    const chordParam = params.get("chord");
    const instrumentParam = (params.get("instrument") || "piano").toLowerCase();
    const gtrStyleParam = (params.get("gtr_style") || "steel").toLowerCase();
    const strumParam = (params.get("strum") || "down").toLowerCase();

    const chordLabel = document.getElementById("chord-label");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const playBtn = document.getElementById("play-btn");

    if (!chordParam) {
      chordLabel.textContent = "No chord provided";
      statusEl.textContent = "Add ?chord=C, ?chord=Am, ?chord=G7, etc.";
      playBtn.disabled = true;
    } else {
      chordLabel.textContent = chordParam;
      statusEl.textContent = "Tap to audition this chord.";
      playBtn.disabled = false;
    }

    // --- Chord parsing ---
    const ROOT_TO_SEMITONE = {
      "C": 0, "B#": 0,
      "C#": 1, "Db": 1,
      "D": 2,
      "D#": 3, "Eb": 3,
      "E": 4, "Fb": 4,
      "F": 5, "E#": 5,
      "F#": 6, "Gb": 6,
      "G": 7,
      "G#": 8, "Ab": 8,
      "A": 9,
      "A#": 10, "Bb": 10,
      "B": 11, "Cb": 11
    };

    function rootToMidi(root, octave = 4) {
      const semitone = ROOT_TO_SEMITONE[root.toUpperCase()];
      if (semitone === undefined) return null;
      return 12 * (octave + 1) + semitone;
    }

    function normalizeQuality(q) {
      if (!q) return "";
      return q
        .replace(/♭/g, "b")
        .replace(/♯/g, "#")
        .replace(/–/g, "-")
        .trim()
        .toLowerCase();
    }

    function parseSimpleChord(chord) {
      const match = chord.match(/^([A-G](?:#|b)?)(.*)$/i);
      if (!match) return null;
      const root = match[1];
      const rawQuality = match[2] || "";
      const quality = normalizeQuality(rawQuality);
      return { root, quality };
    }

    function parseChord(chord) {
      let main = chord;
      let bassRoot = null;

      const slashIndex = chord.indexOf("/");
      if (slashIndex !== -1) {
        main = chord.slice(0, slashIndex).trim();
        const bassPart = chord.slice(slashIndex + 1).trim();
        const m = bassPart.match(/^([A-G](?:#|b)?)/i);
        if (m) bassRoot = m[1];
      }

      const parsedMain = parseSimpleChord(main);
      if (!parsedMain) return null;
      return { root: parsedMain.root, quality: parsedMain.quality, bassRoot };
    }

    function buildChordIntervals(quality) {
      if (quality === "" || quality === "maj" || quality === "major") return [0, 4, 7];
      if (quality === "m" || quality === "min" || quality === "minor") return [0, 3, 7];
      if (quality === "dim" || quality === "°") return [0, 3, 6];
      if (quality === "aug" || quality === "+") return [0, 4, 8];

      if (quality === "7") return [0, 4, 7, 10];
      if (quality === "maj7" || quality === "Δ" || quality === "ma7") return [0, 4, 7, 11];
      if (quality === "m7" || quality === "min7") return [0, 3, 7, 10];
      if (quality === "dim7" || quality === "°7") return [0, 3, 6, 9];
      if (quality === "m7b5" || quality === "ø7") return [0, 3, 6, 10];

      if (quality === "6") return [0, 4, 7, 9];
      if (quality === "m6") return [0, 3, 7, 9];
      if (quality === "maj6") return [0, 4, 7, 9];

      if (quality === "add9") return [0, 4, 7, 14];
      if (quality === "add2") return [0, 2, 4, 7];
      if (quality === "add4" || quality === "add11") return [0, 4, 5, 7];
      if (quality === "add6") return [0, 4, 7, 9];

      if (quality === "6/9" || quality === "69") return [0, 4, 7, 9, 14];

      if (quality === "sus" || quality === "sus4") return [0, 5, 7];
      if (quality.startsWith("sus2")) return [0, 2, 7];
      if (quality === "7sus4") return [0, 5, 7, 10];
      if (quality === "9sus4" || quality === "sus9") return [0, 5, 7, 10, 14];

      if (quality === "9") return [0, 4, 7, 10, 14];
      if (quality === "11") return [0, 4, 7, 10, 14, 17];
      if (quality === "13") return [0, 4, 7, 10, 14, 17, 21];

      if (quality === "maj9") return [0, 4, 7, 11, 14];
      if (quality === "maj11") return [0, 4, 7, 11, 14, 17];
      if (quality === "maj13") return [0, 4, 7, 11, 14, 17, 21];

      if (quality === "m9") return [0, 3, 7, 10, 14];
      if (quality === "m11") return [0, 3, 7, 10, 14, 17];
      if (quality === "m13") return [0, 3, 7, 10, 14, 17, 21];

      if (quality === "7b9") return [0, 4, 7, 10, 13];
      if (quality === "7#9") return [0, 4, 7, 10, 15];
      if (quality === "7b5") return [0, 4, 6, 10];
      if (quality === "7#5") return [0, 4, 8, 10];
      if (quality === "7b9b13") return [0, 4, 7, 10, 13, 20];
      if (quality === "7#9b13") return [0, 4, 7, 10, 15, 20];
      if (quality === "7#11") return [0, 4, 7, 10, 18];
      if (quality === "7b13") return [0, 4, 7, 10, 20];

      if (quality === "7b5b9") return [0, 4, 6, 10, 13];
      if (quality === "7b5#9") return [0, 4, 6, 10, 15];
      if (quality === "7#5b9") return [0, 4, 8, 10, 13];
      if (quality === "7#5#9") return [0, 4, 8, 10, 15];

      if (quality === "7b5b13") return [0, 4, 6, 10, 20];
      if (quality === "7b5#11") return [0, 4, 6, 10, 18];
      if (quality === "7#5b13") return [0, 4, 8, 10, 20];
      if (quality === "7#5#11") return [0, 4, 8, 10, 18];

      if (quality === "7b9#11") return [0, 4, 7, 10, 13, 18];
      if (quality === "7#9#11") return [0, 4, 7, 10, 15, 18];
      if (quality === "7b9b5") return [0, 4, 6, 10, 13];
      if (quality === "7b9#5") return [0, 4, 8, 10, 13];
      if (quality === "7#9b5") return [0, 4, 6, 10, 15];
      if (quality === "7#9#5") return [0, 4, 8, 10, 15];

      if (quality === "7alt") return [0, 4, 6, 8, 10, 13, 15];

      return [0, 4, 7];
    }
      return [0, 4, 7];
    }

    function buildChordNotes(parsed) {
      if (!parsed) return null;
      const { root, quality, bassRoot } = parsed;

      const rootMidi = rootToMidi(root, 4);
      if (rootMidi == null) return null;

      const intervals = buildChordIntervals(quality);
      const chordNotes = intervals.map(i => rootMidi + i);

      if (bassRoot) {
        const bassMidiBase = rootToMidi(bassRoot, 2);
        if (bassMidiBase == null) return chordNotes;

        let bassMidi = bassMidiBase;
        const minChord = Math.min(...chordNotes);
        while (bassMidi > minChord - 10) bassMidi -= 12;

        return [bassMidi, ...chordNotes];
      }

      return chordNotes;
    }

    function mapToGuitarVoicing(midiNotes) {
      if (!midiNotes || !midiNotes.length) return midiNotes;

      let tones = midiNotes.slice().sort((a, b) => a - b);

      let hasBass = false;
      if (tones.length >= 4 && (tones[1] - tones[0]) > 10) {
        hasBass = true;
      }

      const bassStringRoot = 40;
      const upperStringRoots = [52, 57, 62, 67];
      const minFret = 3;
      const maxFret = 9;

      if (hasBass) {
        const bassNote = tones[0];
        const upperTones = tones.slice(1);

        let bassTarget = bassNote;
        while (bassTarget < bassStringRoot + minFret) bassTarget += 12;
        while (bassTarget > bassStringRoot + maxFret) bassTarget -= 12;

        let voicing;
        if (upperTones.length === 3) {
          voicing = [upperTones[0], upperTones[1] + 12, upperTones[2] + 12];
        } else if (upperTones.length >= 4) {
          voicing = [upperTones[1], upperTones[2], upperTones[3], upperTones[0] + 12];
        } else {
          voicing = upperTones.slice();
        }

        let mappedUpper = voicing.map((note, i) => {
          const stringRoot = upperStringRoots[i % upperStringRoots.length];
          let target = note;
          while (target < stringRoot + minFret) target += 12;
          while (target > stringRoot + maxFret) target -= 12;
          return target;
        });

        return [bassTarget, ...mappedUpper];
      } else {
        const stringRoots = [52, 57, 62, 67];

        let tonesSorted = tones;
        let voicing;
        if (tonesSorted.length === 3) {
          voicing = [tonesSorted[0], tonesSorted[1] + 12, tonesSorted[2] + 12];
        } else if (tonesSorted.length === 4) {
          voicing = [tonesSorted[1], tonesSorted[2], tonesSorted[3], tonesSorted[0] + 12];
        } else {
          voicing = [
            tonesSorted[2] || tonesSorted[0],
            tonesSorted[3] || tonesSorted[1] || tonesSorted[0] + 4,
            tonesSorted[0] + 12,
            tonesSorted[1] + 12 || tonesSorted[0] + 16
          ];
        }

        let mapped = voicing.map((note, i) => {
          const stringRoot = stringRoots[i % stringRoots.length];
          let target = note;
          while (target < stringRoot + minFret) target += 12;
          while (target > stringRoot + maxFret) target -= 12;
          return target;
        });

        return mapped;
      }
    }

    let audioCtx = null;
    let reverbNode = null;

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function createSimpleReverb(ctx) {
      const input = ctx.createGain();
      const output = ctx.createGain();
      const delay = ctx.createDelay();
      const feedback = ctx.createGain();
      const tone = ctx.createBiquadFilter();

      delay.delayTime.value = 0.12;
      feedback.gain.value = 0.35;
      tone.type = "lowpass";
      tone.frequency.value = 4000;

      input.connect(delay);
      delay.connect(tone);
      tone.connect(feedback);
      feedback.connect(delay);
      tone.connect(output);

      return { input, output };
    }

    function ensureReverb() {
      if (!reverbNode && audioCtx) {
        const rv = createSimpleReverb(audioCtx);
        rv.output.connect(audioCtx.destination);
        reverbNode = rv;
      }
    }

    function playPiano(midiNotes, duration = 1.8) {
      const now = audioCtx.currentTime;

      midiNotes.forEach((midi, index) => {
        const carrierFreq = midiToFreq(midi);

        const carrier = audioCtx.createOscillator();
        carrier.type = "sine";

        const modulator = audioCtx.createOscillator();
        modulator.type = "sine";

        const modGain = audioCtx.createGain();
        modGain.gain.setValueAtTime(80, now);

        const amp = audioCtx.createGain();
        amp.gain.setValueAtTime(0.0, now);

        const startTime = now + index * 0.01;
        const endTime = startTime + duration;

        amp.gain.linearRampToValueAtTime(0.9, startTime + 0.05);
        amp.gain.linearRampToValueAtTime(0.7, startTime + 0.3);
        amp.gain.linearRampToValueAtTime(0.0, endTime);

        modulator.connect(modGain);
        modGain.connect(carrier.frequency);

        carrier.connect(amp);
        amp.connect(audioCtx.destination);

        carrier.frequency.setValueAtTime(carrierFreq, now);
        modulator.frequency.setValueAtTime(carrierFreq * 2, now);

        carrier.start(startTime);
        modulator.start(startTime);
        carrier.stop(endTime + 0.1);
        modulator.stop(endTime + 0.1);
      });
    }

    function playGuitar(midiNotes, duration = 2.2) {
      ensureReverb();
      const now = audioCtx.currentTime;
      const voiced = mapToGuitarVoicing(midiNotes);

      let notes = voiced.map((m, i) => ({ midi: m, index: i }));
      if (strumParam === "up") notes.reverse();

      const baseStrumGap = (strumParam === "block") ? 0.0 : 0.02;

      notes.forEach((noteObj, orderIndex) => {
        const midi = noteObj.midi;
        const freq = midiToFreq(midi);

        const osc = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const amp = audioCtx.createGain();
        const body = audioCtx.createBiquadFilter();
        const pick = audioCtx.createGain();

        let bodyFreq = 2500;
        let bodyQ = 0.7;
        let baseGain = 0.8;
        let decayTime = duration;
        let reverbSend = 0.4;

        if (gtrStyleParam === "nylon") {
          bodyFreq = 1800;
          bodyQ = 0.9;
          baseGain = 0.7;
          decayTime = duration * 1.2;
          reverbSend = 0.35;
        } else if (gtrStyleParam === "jazz") {
          bodyFreq = 1200;
          bodyQ = 1.0;
          baseGain = 0.75;
          decayTime = duration * 1.1;
          reverbSend = 0.25;
        } else if (gtrStyleParam === "ambient") {
          bodyFreq = 3000;
          bodyQ = 0.5;
          baseGain = 0.6;
          decayTime = duration * 1.8;
          reverbSend = 0.6;
        }

        osc.type = "triangle";
        osc2.type = "sine";

        const startTime = now + orderIndex * baseStrumGap;
        const endTime = startTime + decayTime;

        amp.gain.setValueAtTime(0.0, now);
        amp.gain.linearRampToValueAtTime(baseGain, startTime + 0.02);
        amp.gain.exponentialRampToValueAtTime(0.001, endTime);

        pick.gain.setValueAtTime(1.0, startTime);
