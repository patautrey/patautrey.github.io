<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chord Player</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0b1f26;
      color: #f5f5f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #122b35;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.4);
      text-align: center;
      min-width: 260px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 4px 0 16px;
      opacity: 0.8;
    }
    button {
      background: #1dd1a1;
      border: none;
      color: #041015;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled {
      opacity: 0.5;
      cursor: default;
    }
    button:hover:enabled {
      background: #10ac84;
    }
    .error {
      color: #ff6b6b;
      margin-top: 8px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1 id="chord-label">Chord Player</h1>
    <p id="status">Loading chord…</p>
    <button id="play-btn" disabled>Play again</button>
    <div id="error" class="error"></div>
  </div>

  <script>
    // --- URL params ---
    const params = new URLSearchParams(window.location.search);
    const chordParam = params.get("chord");
    const instrumentParam = (params.get("instrument") || "piano").toLowerCase();
    const gtrStyleParam = (params.get("gtr_style") || "steel").toLowerCase(); // steel, nylon, jazz, ambient
    const strumParam = (params.get("strum") || "down").toLowerCase(); // down, up, block

    const chordLabel = document.getElementById("chord-label");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const playBtn = document.getElementById("play-btn");

    if (!chordParam) {
      chordLabel.textContent = "No chord provided";
      statusEl.textContent = "Add ?chord=C, ?chord=Am, ?chord=G7, etc.";
      playBtn.disabled = true;
    } else {
      chordLabel.textContent = chordParam;
      statusEl.textContent = "Tap to audition this chord.";
      playBtn.disabled = false;
    }

    // --- Chord parsing ---
    function parseChord(chord) {
      const match = chord.match(/^([A-G](?:#|b)?)(.*)$/i);
      if (!match) return null;
      const root = match[1];
      const quality = match[2].toLowerCase().trim();
      return { root, quality };
    }

    const ROOT_TO_SEMITONE = {
      "C": 0, "B#": 0,
      "C#": 1, "Db": 1,
      "D": 2,
      "D#": 3, "Eb": 3,
      "E": 4, "Fb": 4,
      "F": 5, "E#": 5,
      "F#": 6, "Gb": 6,
      "G": 7,
      "G#": 8, "Ab": 8,
      "A": 9,
      "A#": 10, "Bb": 10,
      "B": 11, "Cb": 11
    };

    function rootToMidi(root, octave = 4) {
      const semitone = ROOT_TO_SEMITONE[root.toUpperCase()];
      if (semitone === undefined) return null;
      return 12 * (octave + 1) + semitone;
    }

    function buildChordIntervals(quality) {
      let intervals;
      if (quality === "" || quality === "maj" || quality === "major") {
        intervals = [0, 4, 7];
      } else if (quality === "m" || quality === "min" || quality === "minor") {
        intervals = [0, 3, 7];
      } else if (quality === "7") {
        intervals = [0, 4, 7, 10];
      } else if (quality === "maj7" || quality === "Δ" || quality === "ma7") {
        intervals = [0, 4, 7, 11];
      } else if (quality === "m7" || quality === "min7") {
        intervals = [0, 3, 7, 10];
      } else if (quality === "dim" || quality === "°") {
        intervals = [0, 3, 6];
      } else if (quality === "dim7" || quality === "°7") {
        intervals = [0, 3, 6, 9];
      } else if (quality === "aug" || quality === "+") {
        intervals = [0, 4, 8];
      } else if (quality.startsWith("sus2")) {
        intervals = [0, 2, 7];
      } else if (quality.startsWith("sus4") || quality === "sus") {
        intervals = [0, 5, 7];
      } else {
        intervals = [0, 4, 7];
      }
      return intervals;
    }

    function buildChordNotes(parsed) {
      if (!parsed) return null;
      const { root, quality } = parsed;
      const rootMidi = rootToMidi(root, 4);
      if (rootMidi == null) return null;
      const intervals = buildChordIntervals(quality);
      return intervals.map(i => rootMidi + i);
    }

    // --- Guitar voicing engine (drop-style, guitar range) ---
    function mapToGuitarVoicing(midiNotes) {
      if (!midiNotes || !midiNotes.length) return midiNotes;

      let tones = midiNotes.slice().sort((a, b) => a - b);

      // Guitar sweet spot: frets 3–9 on strings 5–2
      const stringRoots = [52, 57, 62, 67]; // A2, D3, G3, B3
      const minFret = 3;
      const maxFret = 9;

      let voicing;
      if (tones.length === 3) {
        // Spread triad
        voicing = [tones[0], tones[1] + 12, tones[2] + 12];
      } else if (tones.length === 4) {
        // Drop-2
        voicing = [tones[1], tones[2], tones[3], tones[0] + 12];
      } else {
        // Drop-3-ish fallback
        voicing = [tones[2], tones[3] || tones[2] + 4, tones[0] + 12, tones[1] + 12];
      }

      let mapped = voicing.map((note, i) => {
        const stringRoot = stringRoots[i % stringRoots.length];
        let target = note;
        while (target < stringRoot + minFret) target += 12;
        while (target > stringRoot + maxFret) target -= 12;
        return target;
      });

      return mapped;
    }

    // --- Audio ---
    let audioCtx = null;
    let reverbNode = null;

    function midiToFreq(midi) {
      return 440 * Math.pow(2, (midi - 69) / 12);
    }

    function createSimpleReverb(ctx) {
      const input = ctx.createGain();
      const output = ctx.createGain();
      const delay = ctx.createDelay();
      const feedback = ctx.createGain();
      const tone = ctx.createBiquadFilter();

      delay.delayTime.value = 0.12;
      feedback.gain.value = 0.35;
      tone.type = "lowpass";
      tone.frequency.value = 4000;

      input.connect(delay);
      delay.connect(tone);
      tone.connect(feedback);
      feedback.connect(delay);
      tone.connect(output);

      return { input, output };
    }

    function ensureReverb() {
      if (!reverbNode && audioCtx) {
        const rv = createSimpleReverb(audioCtx);
        rv.output.connect(audioCtx.destination);
        reverbNode = rv;
      }
    }

    // --- Piano Voice (FM EP) ---
    function playPiano(midiNotes, duration = 1.8) {
      const now = audioCtx.currentTime;

      midiNotes.forEach((midi, index) => {
        const carrierFreq = midiToFreq(midi);

        const carrier = audioCtx.createOscillator();
        carrier.type = "sine";

        const modulator = audioCtx.createOscillator();
        modulator.type = "sine";

        const modGain = audioCtx.createGain();
        modGain.gain.setValueAtTime(80, now);

        const amp = audioCtx.createGain();
        amp.gain.setValueAtTime(0.0, now);

        const startTime = now + index * 0.01;
        const endTime = startTime + duration;

        amp.gain.linearRampToValueAtTime(0.9, startTime + 0.05);
        amp.gain.linearRampToValueAtTime(0.7, startTime + 0.3);
        amp.gain.linearRampToValueAtTime(0.0, endTime);

        modulator.connect(modGain);
        modGain.connect(carrier.frequency);

        carrier.connect(amp);
        amp.connect(audioCtx.destination);

        carrier.frequency.setValueAtTime(carrierFreq, now);
        modulator.frequency.setValueAtTime(carrierFreq * 2, now);

        carrier.start(startTime);
        modulator.start(startTime);
        carrier.stop(endTime + 0.1);
        modulator.stop(endTime + 0.1);
      });
    }

    // --- Guitar Voice ---
    function playGuitar(midiNotes, duration = 2.2) {
      ensureReverb();
      const now = audioCtx.currentTime;
      const voiced = mapToGuitarVoicing(midiNotes);

      // Strum timing
      let notes = voiced.map((m, i) => ({ midi: m, index: i }));
      if (strumParam === "up") {
        notes.reverse();
      }

      const baseStrumGap = (strumParam === "block") ? 0.0 : 0.02;

      notes.forEach((noteObj, orderIndex) => {
        const midi = noteObj.midi;
        const freq = midiToFreq(midi);

        const osc = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const amp = audioCtx.createGain();
        const body = audioCtx.createBiquadFilter();
        const pick = audioCtx.createGain();

        // Style shaping
        let bodyFreq = 2500;
        let bodyQ = 0.7;
        let baseGain = 0.8;
        let decayTime = duration;
        let reverbSend = 0.4;

        if (gtrStyleParam === "nylon") {
          bodyFreq = 1800;
          bodyQ = 0.9;
          baseGain = 0.7;
          decayTime = duration * 1.2;
          reverbSend = 0.35;
        } else if (gtrStyleParam === "jazz") {
          bodyFreq = 1200;
          bodyQ = 1.0;
          baseGain = 0.75;
          decayTime = duration * 1.1;
          reverbSend = 0.25;
        } else if (gtrStyleParam === "ambient") {
          bodyFreq = 3000;
          bodyQ = 0.5;
          baseGain = 0.6;
          decayTime = duration * 1.8;
          reverbSend = 0.6;
        }

        osc.type = "triangle";
        osc2.type = "sine";

        const startTime = now + orderIndex * baseStrumGap;
        const endTime = startTime + decayTime;

        amp.gain.setValueAtTime(0.0, now);
        amp.gain.linearRampToValueAtTime(baseGain, startTime + 0.02);
        amp.gain.exponentialRampToValueAtTime(0.001, endTime);

        pick.gain.setValueAtTime(1.0, startTime);
        pick.gain.exponentialRampToValueAtTime(0.001, startTime + 0.03);

        body.type = "bandpass";
        body.frequency.setValueAtTime(bodyFreq, now);
        body.Q.setValueAtTime(bodyQ, now);

        osc.frequency.setValueAtTime(freq, now);
        osc2.frequency.setValueAtTime(freq * 2, now);
        osc.detune.setValueAtTime((noteObj.index - 1) * 3, now);

        const noise = audioCtx.createBufferSource();
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) {
          data[i] = (Math.random() * 2 - 1) * 0.4;
        }
        noise.buffer = buffer;

        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(0.6, startTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.03);

        osc.connect(body);
        osc2.connect(body);
        noise.connect(noiseGain);
        noiseGain.connect(body);

        body.connect(pick);
        pick.connect(amp);

        amp.connect(audioCtx.destination);
        if (reverbNode) {
          const send = audioCtx.createGain();
          send.gain.setValueAtTime(reverbSend, now);
          amp.connect(send);
          send.connect(reverbNode.input);
        }

        osc.start(startTime);
        osc2.start(startTime);
        noise.start(startTime);

        osc.stop(endTime + 0.1);
        osc2.stop(endTime + 0.1);
        noise.stop(startTime + 0.08);
      });
    }

    // --- Main click handler ---
    playBtn.addEventListener("click", async () => {
      if (!chordParam) return;

      try {
        errorEl.textContent = "";
        statusEl.textContent = "Playing…";

        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === "suspended") {
          await audioCtx.resume();
        }

        const parsed = parseChord(chordParam);
        const notes = buildChordNotes(parsed);

        if (!notes || !notes.length) {
          statusEl.textContent = "Could not parse chord.";
          return;
        }

        if (instrumentParam === "guitar") {
          playGuitar(notes);
        } else {
          playPiano(notes);
        }

        setTimeout(() => {
          statusEl.textContent = "Tap to audition again.";
        }, 500);

      } catch (err) {
        errorEl.textContent = "Audio error: " + err.message;
        statusEl.textContent = "Error while playing chord.";
      }
    });

    if (chordParam) {
      statusEl.textContent = "Tap to audition this chord.";
    }
  </script>
</body>
</html>
