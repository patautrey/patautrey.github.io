<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test Page</title>
</head>
<body style="background:#111; color:#eee; font-family:sans-serif; padding:20px;">

  <h1>Test Page Loaded</h1>
  <p>If you can see this text, the HTML is working.</p>

  <button onclick="playCChord()">Play C Chord</button>

<script>
  let audioCtx = null;

  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  function createPianoVoice(midi, velocity) {
    ensureAudioContext();
    const ctx = audioCtx;
    const now = ctx.currentTime;

    const duration = 3.0;
    const attack = 0.005;
    const decay = 0.25;
    const sustain = 0.35;
    const release = 1.2;

    const shifted = midi - 12;
    const freq = midiToFreq(shifted);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(velocity, now + attack);
    gain.gain.linearRampToValueAtTime(velocity * sustain, now + attack + decay);
    gain.gain.setTargetAtTime(0, now + duration, release);

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.setValueAtTime(3000, now);

    const osc = ctx.createOscillator();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, now);

    osc.connect(lp);
    lp.connect(gain);
    gain.connect(ctx.destination);

    osc.start(now);
    osc.stop(now + duration + release);
  }

  function playNote(midi, velocity = 1.0) {
    createPianoVoice(midi, velocity);
  }

  function playCChord() {
    playNote(60);
    playNote(64);
    playNote(67);
  }

  window.addEventListener("click", () => {
    playCChord();
  }, { once: true });
</script>

</body>
</html>
