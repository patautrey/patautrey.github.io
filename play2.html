<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>play2 – C Chord Test</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #eee;
      padding: 24px;
      text-align: center;
    }
    button {
      padding: 10px 16px;
      margin: 6px;
      background: #333;
      color: #eee;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #444;
    }
  </style>
</head>
<body>

  <h1>Neutral Studio Piano – C Chord Test</h1>
  <p id="status">Initializing audio…</p>

  <button onclick="playCChord()">Play C Chord</button>

<script>
  let audioCtx = null;

  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      document.getElementById("status").textContent =
        "Audio ready – click Play C Chord or call playNote().";
    }
  }

  function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  // --- Piano voice (octave down + long tail) ---
  function createPianoVoice(midi, velocity) {
    ensureAudioContext();
    const ctx = audioCtx;
    const now = ctx.currentTime;

    // Envelope (extended tail)
    const duration = 3.0;   // long decay
    const attack = 0.005;
    const decay = 0.25;
    const sustain = 0.35;
    const release = 1.2;

    // OCTAVE DOWN
    const shifted = midi - 12;
    const freq = midiToFreq(shifted);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(velocity, now + attack);
    gain.gain.linearRampToValueAtTime(velocity * sustain, now + attack + decay);
    gain.gain.setTargetAtTime(0, now + duration, release);

    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.setValueAtTime(3000, now);
    lp.Q.setValueAtTime(0.7, now);

    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const osc3 = ctx.createOscillator();

    osc1.type = "sine";
    osc2.type = "sine";
    osc3.type = "sine";

    osc1.frequency.setValueAtTime(freq, now);
    osc2.frequency.setValueAtTime(freq * 2, now);
    osc3.frequency.setValueAtTime(freq * 3, now);

    const g1 = ctx.createGain();
    const g2 = ctx.createGain();
    const g3 = ctx.createGain();

    g1.gain.value = 1.0;
    g2.gain.value = 0.35;
    g3.gain.value = 0.18;

    osc2.detune.value = +3;
    osc3.detune.value = -4;

    osc1.connect(g1);
    osc2.connect(g2);
    osc3.connect(g3);

    g1.connect(lp);
    g2.connect(lp);
    g3.connect(lp);

    lp.connect(gain);
    gain.connect(ctx.destination);

    osc1.start(now);
    osc2.start(now);
    osc3.start(now);

    const stopTime = now + duration + release * 2;
    osc1.stop(stopTime);
    osc2.stop(stopTime);
    osc3.stop(stopTime);
  }

  // Public API
  function playNote(midi, velocity = 1.0) {
    velocity = Math.max(0.05, Math.min(1.0, velocity));
    createPianoVoice(midi, velocity);
  }

  window.playNote = playNote;

  // --- C CHORD ---
  function playCChord() {
    playNote(60, 1.0); // C
    playNote(64, 1.0); // E
    playNote(67, 1.0); // G
  }

  // Auto‑play C chord on load
  window.addEventListener("click", () => {
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }, { once: true });

  window.addEventListener("load", () => {
    setTimeout(() => {
      playCChord();
    }, 300);
  });
</script>

</body>
</html>
