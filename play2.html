<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grand Piano Audition</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        text-align: center;
        padding: 40px;
    }
    input {
        font-size: 22px;
        padding: 10px;
        width: 220px;
        text-align: center;
    }
    button {
        font-size: 22px;
        padding: 10px 20px;
        margin-left: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Grand Piano Audition</h1>

<input id="chordInput" placeholder="Enter chord (C, F#m, Bbmaj7)">
<button onclick="playChordFromInput()">Play</button>

<script>
// ------------------------------------------------------------
// 1. Your 12-note custom Grand Piano sample map
// ------------------------------------------------------------
const NOTE_FILES = {
  "C":  "C4.wav",
  "C#": "C#4.wav",
  "DB": "C#4.wav",
  "D":  "D4.wav",
  "D#": "D#4.wav",
  "EB": "D#4.wav",
  "E":  "E4.wav",
  "F":  "F4.wav",
  "F#": "F#4.wav",
  "GB": "F#4.wav",
  "G":  "G4.wav",
  "G#": "G#4.wav",
  "AB": "G#4.wav",
  "A":  "A4.wav",
  "A#": "A#4.wav",
  "BB": "A#4.wav",
  "B":  "B4.wav"
};

// ------------------------------------------------------------
// 2. Bulletproof chord parser (fixes C-major-only bug)
// ------------------------------------------------------------
function getChordFiles(chord) {
  chord = chord.trim().toUpperCase();

  const match = chord.match(/^([A-G][B#]?)(.*)$/);
  if (!match) return ["C4.wav","E4.wav","G4.wav"]; // fallback

  const root = match[1];
  const quality = match[2];

  const SEMITONES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const rootIndex = SEMITONES.indexOf(root.replace("B", "A#"));

  const intervals = {
    "":     [0, 4, 7],
    "M":    [0, 4, 7],
    "MAJ":  [0, 4, 7],
    "MAJ7": [0, 4, 7, 11],
    "7":    [0, 4, 7, 10],
    "M7":   [0, 4, 7, 10],
    "MIN":  [0, 3, 7],
    "M":    [0, 3, 7],
    "MIN7": [0, 3, 7, 10],
    "M7":   [0, 3, 7, 10]
  };

  const q = quality.toUpperCase();
  const ints = intervals[q] || intervals[""];

  return ints.map(i => {
    const note = SEMITONES[(rootIndex + i) % 12];
    return NOTE_FILES[note];
  });
}

// ------------------------------------------------------------
// 3. Play chord from input box
// ------------------------------------------------------------
function playChordFromInput() {
  const chord = document.getElementById("chordInput").value.trim();
  if (!chord) return;
  playChord(chord);
}

// ------------------------------------------------------------
// 4. Play all WAV files for a chord
// ------------------------------------------------------------
function playChord(chord) {
  const files = getChordFiles(chord);
  files.forEach(file => playSample(file));
}

// ------------------------------------------------------------
// 5. Load + play a single WAV file (3× extended length)
// ------------------------------------------------------------
function playSample(filename) {
  const audio = new Audio(filename);
  audio.loop = true;          // loop to extend duration
  audio.play();
  setTimeout(() => audio.pause(), 3000); // 3 seconds
}
</script>

</body>
</html>
