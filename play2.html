<script>
  let audioCtx = null;

  function ensureAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const status = document.getElementById('status');
      if (status) status.textContent = 'Audio ready – click a note or call playNote(midi, velocity).';
    }
  }

  function midiToFreq(midi) {
    return 440 * Math.pow(2, (midi - 69) / 12);
  }

  // UPDATED: octave down + longer tail
  function createPianoVoice(midi, velocity) {
    ensureAudioContext();
    const ctx = audioCtx;

    const now = ctx.currentTime;

    // ↓↓↓ UPDATED ENVELOPE ↓↓↓
    const duration = 3.0;     // doubled tail (was 1.5)
    const attack = 0.005;
    const decay = 0.25;
    const sustainLevel = 0.35;
    const release = 1.2;      // longer release to match longer tail
    // ↑↑↑ UPDATED ENVELOPE ↑↑↑

    // ↓↓↓ UPDATED OCTAVE ↓↓↓
    const shiftedMidi = midi - 12;   // drop by one octave
    const freq = midiToFreq(shiftedMidi);
    // ↑↑↑ UPDATED OCTAVE ↑↑↑

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(velocity, now + attack);
    gain.gain.linearRampToValueAtTime(velocity * sustainLevel, now + attack + decay);
    gain.gain.setTargetAtTime(0, now + duration, release);

    const lp = ctx.createBiquadFilter();
    lp.type = 'lowpass';
    const baseCutoff = 4200;                 // slightly darker for lower octave
    const noteOffset = (shiftedMidi - 60) * 60;
    lp.frequency.setValueAtTime(Math.max(1200, baseCutoff + noteOffset), now);
    lp.Q.setValueAtTime(0.7, now);

    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const osc3 = ctx.createOscillator();

    osc1.type = 'sine';
    osc2.type = 'sine';
    osc3.type = 'sine';

    osc1.frequency.setValueAtTime(freq, now);
    osc2.frequency.setValueAtTime(freq * 2, now);
    osc3.frequency.setValueAtTime(freq * 3, now);

    const g1 = ctx.createGain();
    const g2 = ctx.createGain();
    const g3 = ctx.createGain();

    g1.gain.setValueAtTime(1.0, now);
    g2.gain.setValueAtTime(0.35, now);
    g3.gain.setValueAtTime(0.18, now);

    osc2.detune.setValueAtTime(+3, now);
    osc3.detune.setValueAtTime(-4, now);

    osc1.connect(g1);
    osc2.connect(g2);
    osc3.connect(g3);

    g1.connect(lp);
    g2.connect(lp);
    g3.connect(lp);

    lp.connect(gain);
    gain.connect(ctx.destination);

    osc1.start(now);
    osc2.start(now);
    osc3.start(now);

    const stopTime = now + duration + release * 2;
    osc1.stop(stopTime);
    osc2.stop(stopTime);
    osc3.stop(stopTime);
  }

  function playNote(midi, velocity = 1.0) {
    velocity = Math.max(0.05, Math.min(1.0, velocity || 1.0));
    createPianoVoice(midi, velocity);
  }

  window.playNote = playNote;
</script>
