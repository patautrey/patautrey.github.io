<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chromatic Chord Engine</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        text-align: center;
        padding: 40px;
    }
    h1 {
        color: #6cf;
        margin-bottom: 10px;
    }
    button {
        padding: 12px 20px;
        margin: 8px;
        font-size: 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #333;
        color: #fff;
        transition: 0.2s;
    }
    button:hover {
        background: #555;
    }
    #startOverlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
    }
    #startOverlay button {
        background: #0a84ff;
        font-size: 24px;
        padding: 20px 40px;
    }
    #log {
        margin-top: 20px;
        font-size: 14px;
        color: #9cf;
        white-space: pre-line;
    }
</style>
</head>

<body>

<div id="startOverlay">
    <button onclick="begin()">Click to Begin</button>
</div>

<h1>Chromatic Chord Engine</h1>
<p>All 12 notes loaded directly from WAV files in the root folder.</p>

<button onclick="playChord(['C4','E4','G4'])">C Major</button>
<button onclick="playChord(['D4','F4','A4'])">D Minor</button>
<button onclick="playChord(['G4','B4','D4','F4'])">G7</button>
<button onclick="playChord(['C4','D#4','G4'])">C Minor</button>

<div id="log"></div>

<script>
let audioCtx = null;
let buffers = {};
let ready = false;

function log(msg) {
    document.getElementById("log").textContent += msg + "\n";
}

async function loadNote(name) {
    log("Loading " + name + ".wav ...");
    const response = await fetch(name + ".wav");
    if (!response.ok) {
        log("ERROR: " + name + ".wav not found.");
        return null;
    }
    const arrayBuffer = await response.arrayBuffer();
    return audioCtx.decodeAudioData(arrayBuffer);
}

async function begin() {
    document.getElementById("startOverlay").style.display = "none";

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    log("AudioContext unlocked.");

    const noteNames = [
        "C4","C#4","D4","D#4","E4","F4",
        "F#4","G4","G#4","A4","A#4","B4"
    ];

    for (const n of noteNames) {
        buffers[n] = await loadNote(n);
    }

    ready = true;
    log("All notes loaded.");
}

function playChord(notes) {
    if (!ready) {
        log("Chord attempted before ready.");
        return;
    }

    const now = audioCtx.currentTime;
    notes.forEach(n => {
        if (!buffers[n]) {
            log("Missing buffer: " + n);
            return;
        }
        const src = audioCtx.createBufferSource();
        src.buffer = buffers[n];
        src.connect(audioCtx.destination);
        src.start(now);
    });
}
</script>

</body>
</html>
