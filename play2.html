<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grand Piano Audition</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        text-align: center;
        padding: 40px;
    }
    input {
        font-size: 22px;
        padding: 10px;
        width: 200px;
        text-align: center;
    }
    button {
        font-size: 22px;
        padding: 10px 20px;
        margin-left: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Grand Piano Audition</h1>

<input id="chordInput" placeholder="Enter chord (C, F#m, Bbmaj7)">
<button onclick="playChordFromInput()">Play</button>

<script>
// ------------------------------------------------------------
// 1. Your 12-note custom Grand Piano sample map
// ------------------------------------------------------------
const NOTE_FILES = {
  "C":  "C4.wav",
  "C#": "C#4.wav",
  "Db": "C#4.wav",
  "D":  "D4.wav",
  "D#": "D#4.wav",
  "Eb": "D#4.wav",
  "E":  "E4.wav",
  "F":  "F4.wav",
  "F#": "F#4.wav",
  "Gb": "F#4.wav",
  "G":  "G4.wav",
  "G#": "G#4.wav",
  "Ab": "G#4.wav",
  "A":  "A4.wav",
  "A#": "A#4.wav",
  "Bb": "A#4.wav",
  "B":  "B4.wav"
};

// ------------------------------------------------------------
// 2. Chord → notes → WAV files
// ------------------------------------------------------------
function getChordFiles(chord) {
  const root = chord.match(/[A-G][b#]?/)[0];
  const quality = chord.replace(root, "");

  const SEMITONES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const rootIndex = SEMITONES.indexOf(root.replace("b", "#"));

  const intervals = {
    "":    [0, 4, 7],      // major
    "m":   [0, 3, 7],      // minor
    "7":   [0, 4, 7, 10],  // dominant 7
    "maj7":[0, 4, 7, 11],  // major 7
    "m7":  [0, 3, 7, 10],  // minor 7
  };

  const ints = intervals[quality] || intervals[""];
  return ints.map(i => {
    const note = SEMITONES[(rootIndex + i) % 12];
    return NOTE_FILES[note];
  });
}

// ------------------------------------------------------------
// 3. Play a chord from the input box
// ------------------------------------------------------------
function playChordFromInput() {
  const chord = document.getElementById("chordInput").value.trim();
  if (chord) playChord(chord);
}

// ------------------------------------------------------------
// 4. Play all WAV files for a chord
// ------------------------------------------------------------
function playChord(chord) {
  const files = getChordFiles(chord);
  files.forEach(file => playSample(file));
}

// ------------------------------------------------------------
// 5. Load + play a single WAV file
// ------------------------------------------------------------
function playSample(filename) {
  const audio = new Audio(filename);
  audio.currentTime = 0;
  audio.play();
}
</script>

</body>
</html>
