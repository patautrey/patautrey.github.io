<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grand Piano Audition</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        text-align: center;
        padding: 40px;
    }
    input {
        font-size: 22px;
        padding: 10px;
        width: 220px;
        text-align: center;
    }
    button {
        font-size: 22px;
        padding: 10px 20px;
        margin-left: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Grand Piano Audition</h1>

<input id="chordInput" placeholder="Enter chord (C, F#m, Bb)">
<button onclick="playChordFromInput()">Play</button>

<script>
// ------------------------------------------------------------
// 1. 12-note map (sharps only)
// ------------------------------------------------------------
const NOTE_FILES = {
  "C":  "C4.wav",
  "C#": "C#4.wav",
  "D":  "D4.wav",
  "D#": "D#4.wav",
  "E":  "E4.wav",
  "F":  "F4.wav",
  "F#": "F#4.wav",
  "G":  "G4.wav",
  "G#": "G#4.wav",
  "A":  "A4.wav",
  "A#": "A#4.wav",
  "B":  "B4.wav"
};

const FLATS_TO_SHARPS = {
  "DB": "C#",
  "EB": "D#",
  "GB": "F#",
  "AB": "G#",
  "BB": "A#"
};

const SEMI = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

// ------------------------------------------------------------
// 2. Super-simple chord parser: major / minor triads only
// ------------------------------------------------------------
function getChordFiles(chord) {
  chord = chord.trim();

  if (!chord) return ["C4.wav","E4.wav","G4.wav"];

  // Root = first letter + optional #/b
  const m = chord.match(/^([A-Ga-g][#b]?)/);
  if (!m) return ["C4.wav","E4.wav","G4.wav"];

  let root = m[1].toUpperCase();
  let rest = chord.slice(m[0].length).toLowerCase();

  // Map flats to sharps
  if (root.endsWith("B") && root.length === 2) {
    const flatKey = root;
    if (FLATS_TO_SHARPS[flatKey]) {
      root = FLATS_TO_SHARPS[flatKey];
    }
  }

  // Determine quality: minor if starts with "m" (but not "maj")
  let isMinor = false;
  if (rest.startsWith("m") && !rest.startsWith("maj")) {
    isMinor = true;
  }

  const rootIndex = SEMI.indexOf(root);
  if (rootIndex === -1) return ["C4.wav","E4.wav","G4.wav"];

  const intervals = isMinor ? [0, 3, 7] : [0, 4, 7];

  const notes = intervals.map(i => {
    const noteName = SEMI[(rootIndex + i) % 12];
    return NOTE_FILES[noteName];
  });

  return notes;
}

// ------------------------------------------------------------
// 3. Play chord from input box
// ------------------------------------------------------------
function playChordFromInput() {
  const chord = document.getElementById("chordInput").value.trim();
  if (!chord) return;
  playChord(chord);
}

// ------------------------------------------------------------
// 4. Keep audio objects alive globally
// ------------------------------------------------------------
let activeVoices = [];

// ------------------------------------------------------------
// 5. Play all WAV files for a chord
// ------------------------------------------------------------
function playChord(chord) {
  // stop previous chord
  activeVoices.forEach(a => a.pause());
  activeVoices = [];

  const files = getChordFiles(chord);
  files.forEach(file => playSample(file));
}

// ------------------------------------------------------------
// 6. Load + play a single WAV file (≈4s sustain)
// ------------------------------------------------------------
function playSample(filename) {
  const audio = new Audio(filename);
  audio.loop = true;
  audio.play();

  activeVoices.push(audio);

  setTimeout(() => {
    audio.loop = false;
    audio.pause();
  }, 4000); // ~4 seconds
}
</script>

</body>
</html>
