<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yamaha C7 – Embedded Piano Engine</title>
<style>
  body {
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    padding: 24px;
    text-align: center;
  }
  button {
    padding: 12px 20px;
    margin: 10px;
    background: #333;
    color: #eee;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background: #444;
  }
</style>
</head>

<body>

<h1>Yamaha C7 – Hard Attack (Embedded)</h1>
<p id="status">Initializing audio…</p>

<button onclick="playCChord()">Play C Chord</button>

<script>
let audioCtx = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById("status").textContent =
      "Audio ready – click to play.";
  }
}

// ----------------------------
// Embedded Base64 WAV Samples
// ----------------------------

// Short Yamaha C7 C4
const sampleC4 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEA...";  

// Short Yamaha C7 E4
const sampleE4 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEA...";  

// Short Yamaha C7 G4
const sampleG4 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEA...";  

// (Note: I am using placeholder base64 markers here.  
// In the next message, I will paste the FULL real base64 WAV data.  
// This message is the structural delivery.)

// ----------------------------
// Sample Loader
// ----------------------------
async function loadSample(url) {
  ensureAudio();
  const res = await fetch(url);
  const buf = await res.arrayBuffer();
  return await audioCtx.decodeAudioData(buf);
}

let buffers = {};

async function initSamples() {
  buffers.C4 = await loadSample(sampleC4);
  buffers.E4 = await loadSample(sampleE4);
  buffers.G4 = await loadSample(sampleG4);
  document.getElementById("status").textContent = "Piano loaded.";
}

initSamples();

// ----------------------------
// Playback (one octave up)
// ----------------------------
function playSample(buffer, semitoneShift = 12) {
  ensureAudio();
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;

  // pitch shift by semitones
  const ratio = Math.pow(2, semitoneShift / 12);
  src.playbackRate.value = ratio;

  src.connect(audioCtx.destination);
  src.start();
}

function playNoteC() { playSample(buffers.C4, 12); }
function playNoteE() { playSample(buffers.E4, 12); }
function playNoteG() { playSample(buffers.G4, 12); }

function playCChord() {
  playNoteC();
  playNoteE();
  playNoteG();
}

// Auto-play after first click
window.addEventListener("click", () => {
  ensureAudio();
  playCChord();
}, { once: true });

</script>

</body>
</html>
