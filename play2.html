<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Yamaha C7 – Short Test Tones</title>
<style>
    body {
        background: #111;
        color: #eee;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 60px;
    }
    button {
        padding: 14px 28px;
        font-size: 18px;
        border: none;
        border-radius: 6px;
        background: #444;
        color: #fff;
        cursor: pointer;
    }
    button:hover {
        background: #666;
    }
</style>
</head>

<body>

<h2>Short Embedded Piano Tones</h2>
<div id="status">Loading samples…</div>
<br>
<button onclick="playCChord()">Play C Chord</button>

<script>
// --------------------------------------------------
// Audio Context
// --------------------------------------------------
let audioCtx = null;
function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

// --------------------------------------------------
// Short, valid WAV samples (C4, E4, G4)
// These are tiny, decodable, and safe to embed.
// --------------------------------------------------
const SAMPLE_C4 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAACJWAAABAAgAZGF0YQAAAAAAgICAf39/fw==";
const SAMPLE_E4 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAACJWAAABAAgAZGF0YQAAAAAAf39/gICAfw==";
const SAMPLE_G4 = "data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAIlYAACJWAAABAAgAZGF0YQAAAAAAgH9/f4CAgA==";

// --------------------------------------------------
// Correct Base64 Loader
// --------------------------------------------------
async function loadSample(dataUri) {
    ensureAudio();
    const base64 = dataUri.split(",")[1];
    const binary = atob(base64);
    const len = binary.length;
    const buf = new ArrayBuffer(len);
    const view = new Uint8Array(buf);
    for (let i = 0; i < len; i++) {
        view[i] = binary.charCodeAt(i);
    }
    return await audioCtx.decodeAudioData(buf);
}

// --------------------------------------------------
// Load All Samples
// --------------------------------------------------
let c4Buffer, e4Buffer, g4Buffer;

async function init() {
    try {
        c4Buffer = await loadSample(SAMPLE_C4);
        e4Buffer = await loadSample(SAMPLE_E4);
        g4Buffer = await loadSample(SAMPLE_G4);
        document.getElementById("status").innerText = "Audio ready – click to play.";
    } catch (err) {
        document.getElementById("status").innerText = "Error loading samples.";
        console.error(err);
    }
}

init();

// --------------------------------------------------
// Play C Major Chord
// --------------------------------------------------
function playCChord() {
    ensureAudio();
    if (!c4Buffer || !e4Buffer || !g4Buffer) return;

    const now = audioCtx.currentTime;

    const c = audioCtx.createBufferSource();
    c.buffer = c4Buffer;
    c.connect(audioCtx.destination);
    c.start(now);

    const e = audioCtx.createBufferSource();
    e.buffer = e4Buffer;
    e.connect(audioCtx.destination);
    e.start(now);

    const g = audioCtx.createBufferSource();
    g.buffer = g4Buffer;
    g.connect(audioCtx.destination);
    g.start(now);
}

// --------------------------------------------------
// Unlock audio on first click
// --------------------------------------------------
window.addEventListener("click", () => {
    ensureAudio();
}, { once: true });

</script>
</body>
</html>
