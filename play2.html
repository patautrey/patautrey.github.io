AgICAgICAgICAgICAgICAgICAgICAgICAgICAgICAg  

```js

 

const SAMPLE_G4 = "data:audio/wav;base64,Uk1GRiQAAABXQVZFZm10IBIAAAABAAEAgBBAAAEABAAEAAAAAgAZGF0YQAAAAAgICAF39/f4CAgH9/f4CAgH9/f3+AgIB/f39/gICAgH9/f4CAgH9/f3+AgIA=";


    // ----------------------------
    // Sample Loader
    // ----------------------------
    async function loadSample(dataUri) {
      ensureAudio();
      const res = await fetch(dataUri);
      const buf = await res.arrayBuffer();
      return await audioCtx.decodeAudioData(buf);
    }

    const buffers = {
      C4: null,
      E4: null,
      G4: null
    };

    async function initSamples() {
      try {
        buffers.C4 = await loadSample(SAMPLE_C4);
        buffers.E4 = await loadSample(SAMPLE_E4);
        buffers.G4 = await loadSample(SAMPLE_G4);
        const status = document.getElementById("status");
        if (status) status.textContent = "Piano loaded – click to play C chord.";
      } catch (e) {
        const status = document.getElementById("status");
        if (status) status.textContent = "Error loading samples.";
        console.error(e);
      }
    }

    // kick off loading as soon as possible
    initSamples();

    // ----------------------------
    // Playback (one octave up)
    // ----------------------------
    function playSample(buffer, semitoneShift = 12) {
      if (!buffer) return;
      ensureAudio();
      const src = audioCtx.createBufferSource();
      src.buffer = buffer;

      // pitch shift by semitones
      const ratio = Math.pow(2, semitoneShift / 12);
      src.playbackRate.value = ratio;

      src.connect(audioCtx.destination);
      src.start();
    }

    function playNoteC() { playSample(buffers.C4, 12); }
    function playNoteE() { playSample(buffers.E4, 12); }
    function playNoteG() { playSample(buffers.G4, 12); }

    function playCChord() {
      playNoteC();
      playNoteE();
      playNoteG();
    }

    // Auto-play after first click
    window.addEventListener("click", () => {
      ensureAudio();
      playCChord();
    }, { once: true });
  </script>
