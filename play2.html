<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grand Piano Audition</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        text-align: center;
        padding: 40px;
    }
    input {
        font-size: 22px;
        padding: 10px;
        width: 220px;
        text-align: center;
    }
    button {
        font-size: 22px;
        padding: 10px 20px;
        margin-left: 10px;
        cursor: pointer;
    }
</style>
</head>

<body>

<h1>Grand Piano Audition</h1>

<input id="chordInput" placeholder="Enter chord (C, F#m, Bbmaj7)">
<button onclick="playChordFromInput()">Play</button>

<script>
// ------------------------------------------------------------
// 1. Your 12-note custom Grand Piano sample map
// ------------------------------------------------------------
const NOTE_FILES = {
  "C":  "C4.wav",
  "C#": "C#4.wav",
  "DB": "C#4.wav",
  "D":  "D4.wav",
  "D#": "D#4.wav",
  "EB": "D#4.wav",
  "E":  "E4.wav",
  "F":  "F4.wav",
  "F#": "F#4.wav",
  "GB": "F#4.wav",
  "G":  "G4.wav",
  "G#": "G#4.wav",
  "AB": "G#4.wav",
  "A":  "A4.wav",
  "A#": "A#4.wav",
  "BB": "A#4.wav",
  "B":  "B4.wav"
};

// ------------------------------------------------------------
// 2. Clean, correct chord parser
// ------------------------------------------------------------
function getChordFiles(chord) {
  chord = chord.trim().toUpperCase();

  const match = chord.match(/^([A-G](#|B)?)(.*)$/);
  if (!match) return ["C4.wav","E4.wav","G4.wav"];

  let root = match[1];
  let quality = match[3].trim();

  // Normalize flats
  if (root === "BB") root = "A#";
  if (root === "EB") root = "D#";
  if (root === "AB") root = "G#";
  if (root === "DB") root = "C#";
  if (root === "GB") root = "F#";

  // Normalize qualities
  quality = quality
    .replace("MAJOR", "MAJ")
    .replace("MINOR", "M")
    .replace("MIN", "M")
    .replace("MAJ7", "MAJ7")
    .replace("M7", "M7")
    .replace("MIN7", "M7")
    .replace("DOM7", "7");

  const SEMITONES = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const rootIndex = SEMITONES.indexOf(root);

  const intervals = {
    "":     [0, 4, 7],
    "MAJ":  [0, 4, 7],
    "M":    [0, 3, 7],
    "7":    [0, 4, 7, 10],
    "MAJ7": [0, 4, 7, 11],
    "M7":   [0, 3, 7, 10]
  };

  const ints = intervals[quality] || intervals[""];

  return ints.map(i => {
    const note = SEMITONES[(rootIndex + i) % 12];
    return NOTE_FILES[note];
  });
}

// ------------------------------------------------------------
// 3. Play chord from input box
// ------------------------------------------------------------
function playChordFromInput() {
  const chord = document.getElementById("chordInput").value.trim();
  if (!chord) return;
  playChord(chord);
}

// ------------------------------------------------------------
// 4. Keep audio objects alive globally
// ------------------------------------------------------------
let activeVoices = [];

// ------------------------------------------------------------
// 5. Play all WAV files for a chord
// ------------------------------------------------------------
function playChord(chord) {
  // stop previous chord
  activeVoices.forEach(a => a.pause());
  activeVoices = [];

  const files = getChordFiles(chord);
  files.forEach(file => playSample(file));
}

// ------------------------------------------------------------
// 6. Load + play a single WAV file (guaranteed 6-second sustain)
// ------------------------------------------------------------
function playSample(filename) {
  const audio = new Audio(filename);
  audio.loop = true;      // must be set BEFORE play()
  audio.play();

  activeVoices.push(audio); // keep reference alive

  setTimeout(() => {
    audio.loop = false;
    audio.pause();
  }, 6000);
}
</script>

</body>
</html>
