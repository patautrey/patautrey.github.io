<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chromatic Chord Engine</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #eee;
        text-align: center;
        padding: 40px;
    }
    h1 {
        color: #6cf;
        margin-bottom: 10px;
    }
    button {
        padding: 12px 20px;
        margin: 8px;
        font-size: 18px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #333;
        color: #fff;
        transition: 0.2s;
    }
    button:hover {
        background: #555;
    }
    #startButton {
        background: #0a84ff;
        font-size: 20px;
        padding: 14px 26px;
        margin-bottom: 25px;
    }
</style>
</head>

<body>

<h1>Chromatic Chord Engine</h1>
<p>All 12 notes loaded directly from WAV files in the root folder.</p>

<!-- REQUIRED USER GESTURE -->
<button id="startButton" onclick="initAudio()">Start Audio</button>

<!-- CHORD BUTTONS -->
<button onclick="playChord(['C4','E4','G4'])">C Major</button>
<button onclick="playChord(['D4','F4','A4'])">D Minor</button>
<button onclick="playChord(['G4','B4','D4','F4'])">G7</button>
<button onclick="playChord(['C4','D#4','G4'])">C Minor</button>

<script>
let audioCtx;
const buffers = {};
let initialized = false;

// Load a single WAV file
async function loadNote(name) {
    const response = await fetch(`${name}.wav`);
    const arrayBuffer = await response.arrayBuffer();
    return audioCtx.decodeAudioData(arrayBuffer);
}

// Initialize audio AFTER user gesture
async function initAudio() {
    if (initialized) return;
    initialized = true;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const noteNames = [
        "C4", "C#4", "D4", "D#4", "E4", "F4",
        "F#4", "G4", "G#4", "A4", "A#4", "B4"
    ];

    for (const n of noteNames) {
        buffers[n] = await loadNote(n);
    }

    console.log("All 12 notes loaded.");
    document.getElementById("startButton").style.display = "none";
}

// Play a chord (multiple notes at once)
function playChord(notes) {
    if (!initialized) return;

    const now = audioCtx.currentTime;
    notes.forEach(n => {
        const src = audioCtx.createBufferSource();
        src.buffer = buffers[n];
        src.connect(audioCtx.destination);
        src.start(now);
    });
}
</script>

</body>
</html>
